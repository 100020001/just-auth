<!DOCTYPE html>
<html class=wa-light>

<head>
    <meta charset="UTF-8">
    <title>Verify Your Email</title>
    <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon">
    <link rel=stylesheet href=https://early.webawesome.com/webawesome@3.0.0-beta.6/dist/styles/webawesome.css />
    <link rel=stylesheet href="/css/style.css" />
    <meta name=viewport content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

    <script src=https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js></script>
    <script src=https://cdn.jsdelivr.net/npm/vue-toasted@1.1.28/dist/vue-toasted.min.js></script>
</head>

<body class=wa-stack>

    <div id=app class="wa-stack wa-gap-3xl">

        <div class=card>

            <svg xmlns="http://www.w3.org/2000/svg" width=32 height=32 viewBox="0 0 24 24" fill=none stroke=currentColor stroke-width=2 stroke-linecap=round stroke-linejoin=round>
                <path d="M16.555 3.843l3.602 3.602a2.877 2.877 0 0 1 0 4.069l-2.643 2.643a2.877 2.877 0 0 1 -4.069 0l-.301 -.301l-6.558 6.558a2 2 0 0 1 -1.239 .578l-.175 .008h-1.172a1 1 0 0 1 -.993 -.883l-.007 -.117v-1.172a2 2 0 0 1 .467 -1.284l.119 -.13l.414 -.414h2v-2h2v-2l2.144 -2.144l-.301 -.301a2.877 2.877 0 0 1 0 -4.069l2.643 -2.643a2.877 2.877 0 0 1 4.069 0z" />
                <path d="M15 9h.01" />
            </svg>

            <h3>
                Verify Your Email
            </h3>

            <div class="wa-stack wa-gap-s">
                <div>
                    To ensure secure access to <mark>{{ settings.friendlyName }}</mark>, please verify your email.
                </div>
                <div>
                    Enter your address to receive a verification code.
                </div>
            </div>

            <br>
            <br>

            <div class="wa-stack wa-gap-m">

                <div class="wa-stack wa-gap-xs" v-if="!mailsent">
                    <div class=wa-caption-m>My email</div>
                    <div style="position: relative; display: flex; align-items: center;">
                        <input v-model=user placeholder=john.doe :style="{width: 180 + (user.length * 6.5) + 'px' }" @input=cleanUser @keyup.enter="user && $refs.myButton1.focus()" autofocus />
                        <span style="position: absolute; right: var(--wa-form-control-padding-inline);">
                            <select v-model=selectedDomain>
                                <option v-for="domain in settings.mailDomains" :value=domain>@{{domain}}</option>
                            </select>
                        </span>
                    </div>
                </div>
                <div class="wa-stack wa-gap-xs" v-else>
                    <div class=wa-caption-m>Verification Pin</div>
                    <div>
                        <input v-model=pin placeholder="" style="font-family: var(--wa-font-family-code); text-align: center; letter-spacing: 1.5ch;" @keyup.enter="pin && $refs.myButton2.focus()" ref="pinInput" autofocus />
                    </div>
                </div>

                <button class="wa-size-m wa-neutral" ref=myButton1 @click=sendCode :readonly="!user.length" v-if="!mailsent">
                    Get Code
                </button>
                <button class="wa-size-m wa-neutral" ref=myButton2 @click=verifyCode :readonly="!pin.length" v-else>
                    Verify Pin
                </button>
            </div>

        </div>

        <div class="wa-stack wa-gap-2xs wa-caption-xs">
            <div>
                {{ settings.friendlyName }} uses JustAuth. Effortless. Private. Yours.
            </div>
            <div>
                &copy; 2025 <a href="//justmorris.com" target=_new>JustMorris</a>.
            </div>
        </div>

    </div>

    <script src="/js/app.js"></script>

</body>

</html>
